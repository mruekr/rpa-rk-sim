<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>dinoMountain GmbH - Reisekosten System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; transition: all 0.3s ease; }
        h2 { color: #1a73e8; text-align: center; margin-top: 10px; }
        
        /* Logo Styling */
        .logo-container { text-align: center; margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26,115,232,0.3); }
        
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        
        .link { text-align: center; margin-top: 15px; font-size: 0.9em; color: #666; cursor: pointer; text-decoration: underline; }
        .msg { padding: 12px; margin-top: 15px; border-radius: 6px; display: none; text-align: center; font-weight: 500; }
        .error { background: #fce8e6; color: #c5221f; border: 1px solid #fad2cf; }
        .success { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }

        /* Verstecken des ERP Bereichs am Anfang */
        #erp-interface { display: none; width: 450px; }
    </style>
</head>
<body>

<div id="auth-box" class="box">
    <div class="logo-container">
        <img src="dinomountain.jpg" id="erp-logo" alt="DinoMountain Logo" style="max-width: 180px; height: auto; border-radius: 8px; margin-bottom: 10px;">
    </div>
	
    <h2 id="auth-title">Reisekosten Login</h2>
    
    <input type="text" id="username" placeholder="Benutzername (für Bot)">
    <input type="password" id="password" placeholder="Passwort">
    
    <button id="auth-btn" onclick="handleAuth()">Einloggen</button>
    
    <div id="auth-msg" class="msg"></div>
    <div class="link" onclick="toggleAuth()" id="toggle-link">Noch keinen Account? Hier registrieren</div>
</div>

<div id="erp-interface" class="box">
    <h2>Reisekosten-Erfassung</h2>
    <p style="text-align:center; color: #666; font-size: 0.9em;">System-Status: Bereit für Buchungen</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <label style="font-size: 0.8em; font-weight: bold; color: #555;">Mitarbeiter Name</label>
    <input type="text" id="employee" placeholder="z.B. Max Mustermann">
    
    <label style="font-size: 0.8em; font-weight: bold; color: #555;">Kostenstelle</label>
    <input type="text" id="costCenter" placeholder="z.B. 100-SALES">
    
    <label style="font-size: 0.8em; font-weight: bold; color: #555;">Kategorie</label>
    <select id="category">
        <option value="">-- Bitte wählen --</option>
        <option value="Hotel">Hotel</option>
        <option value="Flug">Flug</option>
        <option value="Verpflegung">Verpflegung</option>
        <option value="Taxi">Taxi</option>
    </select>
    
    <label style="font-size: 0.8em; font-weight: bold; color: #555;">Betrag</label>
    <input type="text" id="amount" placeholder="z.B. 123,45">
	
	<label>Währung (ISO-Code)</label>
    <input type="text" id="currency" placeholder="Nur EUR zulässig">
    
    <label style="font-size: 0.8em; font-weight: bold; color: #555;">Beleg-Referenz</label>
    <input type="text" id="invoiceRef" placeholder="RE-2026-XXXX">

    <button id="btnSubmit" onclick="processBooking()">Buchung abschließen</button>
    
    <div id="statusMessage" class="msg"></div>
    
    <div class="link" onclick="location.reload()" style="color: #c5221f;">Abmelden / System sperren</div>
</div>

<script>
    let isLoginMode = true;

    // Wechsel zwischen Login und Registrierung
    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "ERP Login" : "Registrierung";
        document.getElementById('auth-btn').innerText = isLoginMode ? "Einloggen" : "Account erstellen";
        document.getElementById('toggle-link').innerText = isLoginMode ? "Noch keinen Account? Hier registrieren" : "Zurück zum Login";
        document.getElementById('auth-msg').style.display = 'none';
    }

    // Authentifizierung logik
    function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        const msg = document.getElementById('auth-msg');

        if(!u || !p) { 
            showMsg(msg, "Fehler: Felder dürfen nicht leer sein!", "error"); 
            return; 
        }

        if (isLoginMode) {
            // Login: Check gegen LocalStorage
            const storedPass = localStorage.getItem("user_" + u);
            if (storedPass === p) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('erp-interface').style.display = 'block';
            } else {
                showMsg(msg, "Login fehlgeschlagen: User unbekannt oder Passwort falsch!", "error");
            }
        } else {
            // Registrierung: Speichern im LocalStorage
            localStorage.setItem("user_" + u, p);
            showMsg(msg, "Account erstellt! Bitte jetzt einloggen.", "success");
            toggleAuth();
        }
    }

    // Buchungslogik
    function processBooking() {
        const msg = document.getElementById('statusMessage');
        const fields = ['employee', 'costCenter', 'category', 'amount', "currency", 'invoiceRef'];
        
        // --- NEU: Variablen definieren, damit sie unten geprüft werden können ---
        const curr = document.getElementById('currency').value.trim();
        const amt = document.getElementById('amount').value.trim();
        
        // 1. Prüfung auf Vollständigkeit
        const allFilled = fields.every(id => document.getElementById(id).value.trim() !== "");

        if (!allFilled) {
            showMsg(msg, "ACHTUNG: Buchung unvollständig. Alle Felder sind Pflicht!", "error");
            return; // Stoppt die Funktion hier
        } 
        
        // 2. Prüfung Währung (Nur EUR)
        if (curr !== "EUR") {
            showMsg(msg, "Fehler: Das System akzeptiert nur die Währung EUR!", "error");
            return; // Stoppt die Funktion hier
        }

        // 3. Prüfung Betrag (Deutsches Format: Zahlen, genau ein Komma optional, keine Punkte)
        const germanFormatRegex = /^\d+(,\d{1,2})?$/;
        if (!germanFormatRegex.test(amt)) {
            showMsg(msg, "Fehler: Betrag ungültig! (Format: 12,34 ohne Tausenderpunkte)", "error");
            return; // Stoppt die Funktion hier
        }

        // 4. Erfolg (wird nur erreicht, wenn alle Prüfungen oben bestanden wurden)
        const randomID = Math.floor(Math.random() * 900000) + 100000;
        showMsg(msg, "Reisekostenabrechnung " + randomID + " erfolgreich erstellt", "success");
        
        // Felder leeren für nächste Buchung
        fields.forEach(id => document.getElementById(id).value = '');
    }

    function showMsg(el, txt, type) {
        el.innerText = txt;
        el.className = "msg " + type;
        el.style.display = "block";
    }
</script>

</body>
</html>
